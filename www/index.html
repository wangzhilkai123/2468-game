<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#faf8ef">
  <title>2468</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">2468</div>
      <div class="scores">
        <div class="score-box">
          <div class="score-label">分数</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最高</div>
          <div class="score-value" id="best">0</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-sm" id="undo" disabled>↩ 撤销</button>
      <span class="desc" id="desc">滑动屏幕或按方向键</span>
      <div class="toggles">
        <button class="icon-btn" id="darkBtn" title="夜间模式">🌙</button>
        <button class="icon-btn" id="soundBtn" title="音效">🔊</button>
        <button class="btn btn-sm" id="restart">新游戏</button>
      </div>
    </div>
    <canvas id="game"></canvas>
  </div>

  <script src="js/game.js"></script>
  <script src="js/render.js"></script>
  <script src="js/effects.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('game');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const restartBtn = document.getElementById('restart');
      const undoBtn = document.getElementById('undo');
      const darkBtn = document.getElementById('darkBtn');
      const soundBtn = document.getElementById('soundBtn');

      const game = new GameState(4);
      const renderer = new Renderer(canvas, 4);

      let darkMode = localStorage.getItem('2468-dark') === '1';
      let soundOn = localStorage.getItem('2468-sound') !== '0';

      // --- Effects engine and animation loop ---
      const effects = new EffectsEngine(canvas);
      let animFrameId = null;
      let lastFrameTime = 0;

      function animationFrame(now) {
        const dt = Math.min((now - lastFrameTime) / 1000, 0.1);
        lastFrameTime = now;
        effects.update(dt);
        render();
        effects.draw(renderer.ctx);
        if (effects.needsLoop) {
          animFrameId = requestAnimationFrame(animationFrame);
        } else {
          animFrameId = null;
          render();
        }
      }

      function ensureLoopRunning() {
        if (!animFrameId) {
          lastFrameTime = performance.now();
          animFrameId = requestAnimationFrame(animationFrame);
        }
      }

      function stopLoop() {
        if (animFrameId) {
          cancelAnimationFrame(animFrameId);
          animFrameId = null;
        }
      }

      function doMove(dir) {
        const result = game.move(dir);
        if (!result.moved) return;
        if (result.merges.length > 0) {
          effects.addMergeEffects(result.merges, renderer);
          ensureLoopRunning();
        }
        render();
      }

      function applyDark() {
        document.body.classList.toggle('dark', darkMode);
        renderer.dark = darkMode;
        darkBtn.textContent = darkMode ? '☀️' : '🌙';
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = darkMode ? '#1e1e2e' : '#faf8ef';
      }

      function applySound() {
        game.audio.enabled = soundOn;
        soundBtn.textContent = soundOn ? '🔊' : '🔇';
      }

      applyDark();
      applySound();

      function updateUI(state) {
        scoreEl.textContent = state.score;
        bestEl.textContent = state.best;
        undoBtn.disabled = !game.canUndo();
      }

      function render() {
        const state = game.getState();
        renderer.draw(state);
        updateUI(state);
      }

      // Touch input
      let touchStartX = 0, touchStartY = 0;
      let touchActive = false;

      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        touchActive = true;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: false });

      canvas.addEventListener('touchend', function(e) {
        if (!touchActive) return;
        touchActive = false;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 20) return;

        let dir;
        if (absDx > absDy) {
          dir = dx > 0 ? 'right' : 'left';
        } else {
          dir = dy > 0 ? 'down' : 'up';
        }

        doMove(dir);
      });

      canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
      }, { passive: false });

      // Keyboard input
      document.addEventListener('keydown', function(e) {
        const keyMap = {
          'ArrowUp': 'up', 'ArrowDown': 'down',
          'ArrowLeft': 'left', 'ArrowRight': 'right',
          'w': 'up', 'W': 'up', 's': 'down', 'S': 'down',
          'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right'
        };
        const dir = keyMap[e.key];
        if (dir) {
          e.preventDefault();
          doMove(dir);
        }
        if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          if (game.undo()) render();
        }
      });

      // Buttons
      restartBtn.addEventListener('click', function() {
        stopLoop();
        effects.clear();
        game.init();
        render();
      });

      undoBtn.addEventListener('click', function() {
        if (game.undo()) render();
      });

      darkBtn.addEventListener('click', function() {
        darkMode = !darkMode;
        localStorage.setItem('2468-dark', darkMode ? '1' : '0');
        applyDark();
        render();
      });

      soundBtn.addEventListener('click', function() {
        soundOn = !soundOn;
        localStorage.setItem('2468-sound', soundOn ? '1' : '0');
        applySound();
      });

      // Resize
      window.addEventListener('resize', function() {
        renderer.resize();
        effects.clear();
        stopLoop();
        render();
      });

      // Initial render
      render();

      // Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    })();
  </script>
</body>
</html>
